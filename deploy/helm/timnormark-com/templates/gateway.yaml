{{- if .Values.gateway.enabled -}}
{{- if .Values.gatewayClass.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gatewayClass.name }}
  labels:
    {{- include "timnormark-com.labels" . | nindent 4 }}
spec:
  controllerName: {{ .Values.gatewayClass.controllerName }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "timnormark-com.fullname" . }}
  labels:
    {{- include "timnormark-com.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gatewayClass.name }}
  listeners:
    {{- range .Values.gateway.listeners }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      {{- with .hostname }}
      hostname: {{ . | quote }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "timnormark-com.fullname" . }}
  labels:
    {{- include "timnormark-com.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.gateway.route.parentRefs }}
    - name: {{ default (include "timnormark-com.fullname" $) .name }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- end }}
  hostnames:
    {{- toYaml .Values.gateway.route.hostnames | nindent 4 }}
  rules:
    {{- range .Values.gateway.route.rules }}
    - matches:
        {{- toYaml .matches | nindent 8 }}
      backendRefs:
        - name: {{ include "timnormark-com.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
