# Server block for the temporary static production lane. Mounted into
# nginx:alpine at /etc/nginx/conf.d/default.conf (see docker-compose.yml);
# the stock main nginx.conf stays untouched.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # site/ is bind-mounted, so edits go live on the next request. Keep asset
    # caching short — there is no fingerprinting in this lane.
    location /assets/ {
        add_header Cache-Control "public, max-age=300";
    }
}
