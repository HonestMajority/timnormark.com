name: Promote staging digest to prod

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Update prod Helm values
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update prod digest
        run: scripts/promote-digest.sh

      - name: Create promotion pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: promote/prod-${{ github.run_id }}
          title: "chore: promote prod image digest"
          commit-message: "chore: promote prod image digest"
          body: |
            Promotes the exact image digest currently configured in staging.

            Staging digest: `${{ env.PROMOTED_DIGEST }}`
          add-paths: |
            deploy/helm/timnormark-com/values-prod.yaml
